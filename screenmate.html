<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 280px;
  height: 360px;
  background: transparent;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.wrapper { 
  width: 280px; 
  height: 360px; 
  position: relative;
  cursor: grab;
}
.wrapper:active { cursor: grabbing; }

@keyframes bob       { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-4px)} }
@keyframes fastbob   { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-2px)} }
@keyframes sleeptilt { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(5px) rotate(-3deg)} }
@keyframes floatz    { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-28px) scale(0.6)} }
@keyframes tailwag   { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(12deg)} }
@keyframes popspeech { 0%{opacity:0;transform:translateX(-50%) scale(0.8) translateY(6px)} 14%{opacity:1;transform:translateX(-50%) scale(1) translateY(0)} 78%{opacity:1} 100%{opacity:0} }
@keyframes rageShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
@keyframes matrixRain {
  0% { background-position: 0% 0%; }
  100% { background-position: 0% 100%; }
}
@keyframes glitchText {
  0% { transform: skew(0deg); opacity: 1; }
  20% { transform: skew(5deg); opacity: 0.8; }
  40% { transform: skew(-5deg); opacity: 1; }
  60% { transform: skew(2deg); opacity: 0.9; }
  80% { transform: skew(-2deg); opacity: 1; }
  100% { transform: skew(0deg); opacity: 1; }
}
@keyframes pulse {
  0%,100% { opacity: 0.5; }
  50% { opacity: 1; }
}

.cat-g { transform-origin: 140px 170px; }
.state-idle     .cat-g  { animation: bob       3.2s ease-in-out infinite; }
.state-typing   .cat-g  { animation: fastbob   0.2s ease-in-out infinite; }
.state-sleeping .cat-g  { animation: sleeptilt 3.8s ease-in-out infinite; }
.state-rage     .cat-g  { animation: rageShake 0.15s ease-in-out infinite; }

.tail-g { transform-origin: 95px 215px; }
.state-idle    .tail-g  { animation: tailwag  1.8s ease-in-out infinite; }
.state-typing  .tail-g  { animation: tailwag  0.6s ease-in-out infinite; }
.state-rage    .tail-g  { animation: tailwag  0.1s ease-in-out infinite; }

.zzz { opacity:0; transition:opacity 0.5s; }
.state-sleeping .zzz { opacity:1; }
.z1 { animation: floatz 2.1s ease-out 0s   infinite; }
.z2 { animation: floatz 2.1s ease-out 0.6s infinite; }
.z3 { animation: floatz 2.1s ease-out 1.2s infinite; }

.speech {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0f0a;
  border: 1.5px solid #00ff88;
  border-radius: 10px;
  padding: 6px 14px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  font-weight: bold;
  color: #00ff88;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  letter-spacing: 0.5px;
  max-width: 250px;
  overflow: visible;
  text-shadow: 0 0 2px black;
  box-shadow: 0 0 8px rgba(0,255,136,0.3);
}
.speech::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-top-color: #00ff88;
  border-bottom: 0;
}
.speech.show { animation: popspeech 3.2s ease forwards; }

.hack-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 25;
  opacity: 0;
  border-radius: 12px;
  overflow: hidden;
}
.hack-overlay.active {
  animation: glitchText 0.1s infinite;
}
.hack-matrix {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(0deg, #00ff41 0%, #00ff41 2%, transparent 3%, transparent 100%);
  background-size: 100% 8px;
  opacity: 0;
  pointer-events: none;
}
.hack-matrix.active {
  animation: matrixRain 0.5s linear infinite;
  opacity: 0.6;
}

.rage-meter-container {
  position: absolute;
  bottom: 8px;
  left: 10px;
  right: 10px;
  background: rgba(0,0,0,0.8);
  border-radius: 6px;
  padding: 3px 6px;
  z-index: 30;
  backdrop-filter: blur(2px);
  border: 1px solid #ff3366;
  cursor: pointer;
}
.rage-label {
  font-family: 'Courier New', monospace;
  font-size: 7px;
  color: #ff6688;
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}
.rage-bar-bg {
  background: #331122;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
}
.rage-bar-fill {
  background: linear-gradient(90deg, #ff6688, #ff0033);
  width: 0%;
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}
.rage-emoji {
  font-size: 8px;
  margin-left: 4px;
}

.fake-popup {
  position: fixed;
  background: #c0c0c0;
  border: 3px solid #ffffff;
  border-radius: 8px;
  box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
  font-family: 'Courier New', monospace;
  z-index: 10000;
  min-width: 280px;
  animation: popupAppear 0.2s ease-out;
}
@keyframes popupAppear {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.popup-titlebar {
  background: #000080;
  color: white;
  padding: 5px 8px;
  font-size: 12px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  cursor: move;
}
.popup-content {
  background: #ffffff;
  padding: 15px;
  color: #000000;
  font-size: 12px;
}
.popup-content button {
  margin-top: 10px;
  padding: 4px 12px;
  background: #c0c0c0;
  border: 2px outset #ffffff;
  cursor: pointer;
  font-family: monospace;
}
.popup-content button:active {
  border: 2px inset #ffffff;
}

.fake-terminal {
  position: fixed;
  background: #0a0a0a;
  color: #00ff41;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  border: 2px solid #00ff41;
  border-radius: 5px;
  z-index: 10001;
  width: 550px;
  height: 320px;
  box-shadow: 0 0 20px rgba(0,255,65,0.5);
  animation: popupAppear 0.2s ease-out;
}
.terminal-header {
  background: #1a1a1a;
  padding: 6px 10px;
  border-bottom: 1px solid #00ff41;
  display: flex;
  justify-content: space-between;
  cursor: move;
}
.terminal-body {
  padding: 10px;
  overflow-y: auto;
  height: calc(100% - 35px);
  font-size: 11px;
  line-height: 1.4;
}
.terminal-line {
  white-space: nowrap;
  overflow-x: auto;
}
</style>
</head>

// ==================== HELPER: Get random position within VISIBLE screen ====================
function getRandomScreenPosition(elementWidth, elementHeight) {
  const screenWidth = window.innerWidth || document.documentElement.clientWidth;
  const screenHeight = window.innerHeight || document.documentElement.clientHeight;
  const margin = 30;
  const maxX = screenWidth - elementWidth - margin;
  const maxY = screenHeight - elementHeight - margin;
  const minX = margin;
  const minY = margin;
  const randomX = Math.max(minX, Math.random() * (maxX - minX) + minX);
  const randomY = Math.max(minY, Math.random() * (maxY - minY) + minY);
  return { x: randomX, y: randomY };
}

// ==================== FAKE POPUPS ====================
function createFakePopup(title, content, isScary = false) {
  const existing = document.querySelectorAll('.fake-popup');
  if (existing.length > 5) existing[0].remove();
  
  const popup = document.createElement('div');
  popup.className = 'fake-popup';
  popup.style.visibility = 'hidden';
  popup.style.position = 'fixed';
  popup.style.left = '0';
  popup.style.top = '0';
  document.body.appendChild(popup);
  
  let titleText = title;
  let contentHtml = content;
  
  if (isScary) {
    titleText = '⚠️ SYSTEM ALERT ⚠️';
    contentHtml = `
      <div style="color:#ff0000; font-weight:bold; text-align:center;">
        ${content}
        <br><br>
        <div style="background:#000; color:#0f0; padding:5px; font-size:10px;">
          >_ Press OK to continue...
        </div>
      </div>
      <button onclick="this.closest('.fake-popup').remove()">OK</button>
    `;
  } else {
    contentHtml = `
      ${content}
      <br><br>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button onclick="this.closest('.fake-popup').remove()">OK</button>
        <button onclick="this.closest('.fake-popup').remove()">Cancel</button>
      </div>
    `;
  }
  
  popup.innerHTML = `
    <div class="popup-titlebar">
      <span>${titleText}</span>
      <span style="cursor:pointer;" onclick="this.closest('.fake-popup').remove()">✖</span>
    </div>
    <div class="popup-content">${contentHtml}</div>
  `;
  
  const popupWidth = popup.offsetWidth;
  const popupHeight = popup.offsetHeight;
  const { x, y } = getRandomScreenPosition(popupWidth, popupHeight);
  
  popup.style.visibility = 'visible';
  popup.style.left = Math.max(0, x) + 'px';
  popup.style.top = Math.max(0, y) + 'px';
  
  let isDragging = false;
  let dragOffset = { x: 0, y: 0 };
  const titlebar = popup.querySelector('.popup-titlebar');
  
  titlebar.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragOffset.x = e.clientX - popup.offsetLeft;
    dragOffset.y = e.clientY - popup.offsetTop;
    popup.style.zIndex = '10002';
    e.preventDefault();
  });
  
  window.addEventListener('mousemove', (e) => {
    if (isDragging) {
      let newX = e.clientX - dragOffset.x;
      let newY = e.clientY - dragOffset.y;
      newX = Math.min(window.innerWidth - popupWidth, Math.max(0, newX));
      newY = Math.min(window.innerHeight - popupHeight, Math.max(0, newY));
      popup.style.left = newX + 'px';
      popup.style.top = newY + 'px';
    }
  });
  
  window.addEventListener('mouseup', () => { isDragging = false; });
  setTimeout(() => { if(popup && popup.remove) popup.remove(); }, 15000);
  return popup;
}

// ==================== RAGE SYSTEM ====================
function increaseRage(amount, reason) {

function updateRageUI() {
  const fill = document.getElementById('rageFill');

  const tears = document.getElementById('tears');

  const root = document.getElementById('root');
  
  fill.style.width = rageLevel + '%';
  if (rageLevel < 20) emoji.innerText = '😺';
  else if (rageLevel < 50) emoji.innerText = '😐';
  else if (rageLevel < 80) emoji.innerText = '😾';

    tears.style.opacity = '0.7';
    angryBrows.style.opacity = '0.8';

    tears.style.opacity = '0';

function resetRage() {

    const matrixDiv = document.getElementById('matrix');
    const overlay = document.getElementById('hackOverlay');
    matrixDiv.classList.remove('active');
    overlay.classList.remove('active');
  } else if (rageLevel > 0) {
    rageLevel = 0;
    updateRageUI();
    showSpeech('😌 rage reset.');

}

// ==================== EYE TRACKING ====================
let mouseX = 140, mouseY = 126;
const pupL = document.getElementById('pup-l');
const pupR = document.getElementById('pup-r');
const shiL = document.getElementById('shi-l');
const shiR = document.getElementById('shi-r');

function updatePupils() {
  if (rageMode) return;
  const leftEyeX = 108, leftEyeY = 124;
  const rightEyeX = 172, rightEyeY = 124;
  const maxOffset = 8;
  let angleL = Math.atan2(mouseY - leftEyeY, mouseX - leftEyeX);
  let angleR = Math.atan2(mouseY - rightEyeY, mouseX - rightEyeX);
  let distL = Math.min(1, Math.hypot(mouseX - leftEyeX, mouseY - leftEyeY) / 80);
  let distR = Math.min(1, Math.hypot(mouseX - rightEyeX, mouseY - rightEyeY) / 80);
  const offsetL = maxOffset * distL;
  const offsetR = maxOffset * distR;
  pupL.setAttribute('cx', leftEyeX + Math.cos(angleL) * offsetL);
  pupL.setAttribute('cy', leftEyeY + Math.sin(angleL) * offsetL);
  pupR.setAttribute('cx', rightEyeX + Math.cos(angleR) * offsetR);
  pupR.setAttribute('cy', rightEyeY + Math.sin(angleR) * offsetR);
  shiL.setAttribute('cx', leftEyeX + Math.cos(angleL) * (offsetL - 3));
  shiL.setAttribute('cy', leftEyeY + Math.sin(angleL) * (offsetL - 4));
  shiR.setAttribute('cx', rightEyeX + Math.cos(angleR) * (offsetR - 3));
  shiR.setAttribute('cy', rightEyeY + Math.sin(angleR) * (offsetR - 4));
}

window.updatePupils = updatePupils;

document.addEventListener('mousemove', (e) => {
  const rect = document.querySelector('.wrapper').getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  updatePupils();
});
