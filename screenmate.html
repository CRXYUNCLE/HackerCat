<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 280px;
  height: 360px;
  background: transparent;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.wrapper { 
  width: 100%; 
  height: 100%; 
  position: relative;
}

/* Make the entire wrapper draggable */
.wrapper {
  -webkit-app-region: drag;
}

/* But make interactive elements non-draggable */
.cat-click-area, .rage-meter-container, svg {
  -webkit-app-region: no-drag;
}

@keyframes bob       { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-4px)} }
@keyframes fastbob   { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-2px)} }
@keyframes sleeptilt { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(5px) rotate(-3deg)} }
@keyframes floatz    { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-28px) scale(0.6)} }
@keyframes tailwag   { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(12deg)} }
@keyframes popspeech { 0%{opacity:0;transform:translateX(-50%) scale(0.8) translateY(6px)} 14%{opacity:1;transform:translateX(-50%) scale(1) translateY(0)} 78%{opacity:1} 100%{opacity:0} }
@keyframes rageShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }

.cat-g { transform-origin: 140px 170px; }
.state-idle     .cat-g  { animation: bob       3.2s ease-in-out infinite; }
.state-typing   .cat-g  { animation: fastbob   0.2s ease-in-out infinite; }
.state-sleeping .cat-g  { animation: sleeptilt 3.8s ease-in-out infinite; }
.state-rage     .cat-g  { animation: rageShake 0.15s ease-in-out infinite; }

.tail-g { transform-origin: 95px 215px; }
.state-idle    .tail-g  { animation: tailwag  1.8s ease-in-out infinite; }
.state-typing  .tail-g  { animation: tailwag  0.6s ease-in-out infinite; }
.state-rage    .tail-g  { animation: tailwag  0.1s ease-in-out infinite; }

.zzz { opacity:0; transition:opacity 0.5s; }
.state-sleeping .zzz { opacity:1; }
.z1 { animation: floatz 2.1s ease-out 0s   infinite; }
.z2 { animation: floatz 2.1s ease-out 0.6s infinite; }
.z3 { animation: floatz 2.1s ease-out 1.2s infinite; }

.speech {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0f0a;
  border: 1.5px solid #00ff88;
  border-radius: 10px;
  padding: 6px 14px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  font-weight: bold;
  color: #00ff88;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  letter-spacing: 0.5px;
  max-width: 250px;
  overflow: visible;
  text-shadow: 0 0 2px black;
  box-shadow: 0 0 8px rgba(0,255,136,0.3);
}
.speech::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-top-color: #00ff88;
  border-bottom: 0;
}
.speech.show { animation: popspeech 3.2s ease forwards; }

.rage-meter-container {
  position: absolute;
  bottom: 8px;
  left: 10px;
  right: 10px;
  background: rgba(0,0,0,0.8);
  border-radius: 6px;
  padding: 3px 6px;
  z-index: 30;
  backdrop-filter: blur(2px);
  border: 1px solid #ff3366;
  cursor: pointer;
}
.rage-label {
  font-family: 'Courier New', monospace;
  font-size: 7px;
  color: #ff6688;
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}
.rage-bar-bg {
  background: #331122;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
}
.rage-bar-fill {
  background: linear-gradient(90deg, #ff6688, #ff0033);
  width: 0%;
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}
.rage-emoji {
  font-size: 8px;
  margin-left: 4px;
}
</style>
</head>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script>
// QWebChannel bridge setup
let pybridge = null;
new QWebChannel(qt.webChannelTransport, function(channel) {
    pybridge = channel.objects.pybridge;
    console.log("QWebChannel ready, pybridge available");
});

// ==================== TYPING SIMULATION ====================
const hackingWords = [
    'sudo', 'meow', 'hack', 'login', 'access', 'granted', 'denied', 
    'password', 'error', 'success', 'failed', 'connecting', 'bypass',
    'firewall', 'detected', 'scanning', 'downloading', 'uploading',
    'encrypting', 'decrypting', 'injecting', 'payload', 'exploit',
    'root', 'admin', 'guest', 'anonymous', 'breach', 'security'
];

let isTyping = false;

function typeRandomWord() {
    if (isTyping) return;
    isTyping = true;
    
    const laptopText = document.getElementById('laptop-text');
    const root = document.getElementById('root');
    
    if (!laptopText) return;
    
    root.classList.add('state-typing');
    
    const word = hackingWords[Math.floor(Math.random() * hackingWords.length)];
    const fullText = `>_ ${word}...`;
    let i = 0;
    
    function typeNextChar() {
        if (i <= fullText.length) {
            laptopText.textContent = fullText.substring(0, i);
            i++;
            setTimeout(typeNextChar, 100 + Math.random() * 100);
        } else {
            setTimeout(() => {
                laptopText.textContent = '>_ ';
                setTimeout(() => {
                    isTyping = false;
                    root.classList.remove('state-typing');
                    setTimeout(typeRandomWord, 2000 + Math.random() * 3000);
                }, 500);
            }, 1500 + Math.random() * 1000);
        }
    }
    
    typeNextChar();
}

setTimeout(typeRandomWord, 1000);

// ==================== RAGE SYSTEM ====================
let rageLevel = 0;
let rageMode = false;

function updateRageUI() {
    const fill = document.getElementById('rageFill');
    const emoji = document.getElementById('rageEmoji');
    const tears = document.getElementById('tears');
    const angryBrows = document.getElementById('angry-brows');
    const root = document.getElementById('root');
    
    if (fill) fill.style.width = rageLevel + '%';
    if (emoji) {
        if (rageLevel < 20) emoji.innerText = '😺';
        else if (rageLevel < 50) emoji.innerText = '😐';
        else if (rageLevel < 80) emoji.innerText = '😾';
        else emoji.innerText = '👿';
    }
    if (tears && angryBrows) {
        if (rageLevel > 70) { tears.style.opacity = '0.7'; angryBrows.style.opacity = '0.8'; }
        else { tears.style.opacity = '0'; angryBrows.style.opacity = '0'; }
    }
    if (root) {
        if (rageLevel > 90) root.classList.add('state-rage');
        else root.classList.remove('state-rage');
    }
}

function showSpeech(msg) {
    const speechDiv = document.getElementById('speech');
    if (!speechDiv) return;
    speechDiv.textContent = msg;
    speechDiv.className = 'speech';
    void speechDiv.offsetWidth;
    speechDiv.className = 'speech show';
    setTimeout(() => { if (speechDiv) speechDiv.style.opacity = '0'; }, 3000);
}

function increaseRage(amount, reason) {
    if (rageMode) return;
    rageLevel = Math.min(100, rageLevel + amount);
    updateRageUI();
    showSpeech(`😾 +${amount.toFixed(1)}% RAGE! (${reason})`);
    if (rageLevel >= 100 && !rageMode) {
        rageMode = true;
        // Tell Python to open a full-screen overlay
        if (pybridge && pybridge.startFullscreenRage) {
            pybridge.startFullscreenRage();
        } else {
            console.error("pybridge not available");
        }
        showSpeech('💢 FULL SCREEN CHAOS ENGAGED! 💢');
        
        // Reset rage locally after 10 seconds
        setTimeout(() => {
            rageLevel = 0;
            rageMode = false;
            updateRageUI();
            showSpeech('😌 Chaos over. Rage reset.');
            const root = document.getElementById('root');
            if (root) root.classList.remove('state-rage');
        }, 10000);
    }
}

// ==================== EVENT LISTENERS ====================
const catSvg = document.querySelector('svg');
if (catSvg) {
    catSvg.addEventListener('click', (e) => {
        e.stopPropagation();
        if (e.target.closest('#rageContainer')) return;
        if (!rageMode) {
            const increase = Math.random() * 5;
            if (increase > 0.3) {
                increaseRage(increase, 'clicked cat');
            }
            const reactions = ['😾 stop!', '🐱 hey!', '👿 meow!', '💢 STOP!', '🔥 annoying!'];
            if (Math.random() > 0.7) showSpeech(reactions[Math.floor(Math.random() * reactions.length)]);
        } else showSpeech('💢 RAGE MODE ACTIVE! 💢');
    });
}

document.getElementById('rageContainer')?.addEventListener('click', (e) => {
    e.stopPropagation();
    if (rageMode) showSpeech('💢 TOO LATE!');
    else if (rageLevel > 0) { 
        rageLevel = 0; 
        updateRageUI(); 
        showSpeech('😌 rage reset.'); 
    }
});

// ==================== EYE TRACKING ====================
let mouseX = 140, mouseY = 126;
const pupL = document.getElementById('pup-l');
const pupR = document.getElementById('pup-r');
const shiL = document.getElementById('shi-l');
const shiR = document.getElementById('shi-r');

function updatePupils() {
    if (!pupL || !pupR) return;
    const leftEyeX = 108, leftEyeY = 124;
    const rightEyeX = 172, rightEyeY = 124;
    const maxOffset = 8;
    let angleL = Math.atan2(mouseY - leftEyeY, mouseX - leftEyeX);
    let angleR = Math.atan2(mouseY - rightEyeY, mouseX - rightEyeX);
    let distL = Math.min(1, Math.hypot(mouseX - leftEyeX, mouseY - leftEyeY) / 80);
    let distR = Math.min(1, Math.hypot(mouseX - rightEyeX, mouseY - rightEyeY) / 80);
    const offsetL = maxOffset * distL;
    const offsetR = maxOffset * distR;
    pupL.setAttribute('cx', leftEyeX + Math.cos(angleL) * offsetL);
    pupL.setAttribute('cy', leftEyeY + Math.sin(angleL) * offsetL);
    pupR.setAttribute('cx', rightEyeX + Math.cos(angleR) * offsetR);
    pupR.setAttribute('cy', rightEyeY + Math.sin(angleR) * offsetR);
    if (shiL && shiR) {
        shiL.setAttribute('cx', leftEyeX + Math.cos(angleL) * (offsetL - 3));
        shiL.setAttribute('cy', leftEyeY + Math.sin(angleL) * (offsetL - 4));
        shiR.setAttribute('cx', rightEyeX + Math.cos(angleR) * (offsetR - 3));
        shiR.setAttribute('cy', rightEyeY + Math.sin(angleR) * (offsetR - 4));
    }
}

document.addEventListener('mousemove', (e) => {
    const rect = document.querySelector('.wrapper')?.getBoundingClientRect();
    if (rect) {
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
        updatePupils();
    }
});

// ==================== RANDOM SPEECH ====================
const MSGS = ['🐱 meow.', '💻 hacking...', 'sudo rm -rf /fun', '🔓 access granted', '👀 i see u.', '>_ cat /dev/null', '🐱‍💻 payload deployed', '🔥 firewall? lol', 'need coffee!!'];
setInterval(() => {
    if (!rageMode && Math.random() < 0.3) {
        showSpeech(MSGS[Math.floor(Math.random() * MSGS.length)]);
    }
}, 12000);

// Laptop cursor blink
setInterval(() => {
    const cursor = document.getElementById('laptop-cursor');
    if (cursor) cursor.style.opacity = cursor.style.opacity === '0.8' ? '0.2' : '0.8';
}, 500);

console.log('🐱‍💻 Hacker Cat v8.0 - Full-screen rage overlay ready');
</script>
